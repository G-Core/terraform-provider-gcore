name: Promote SDKs

# Promote staging to production: fast-forward production `main` up to the
# staging trunk, preserving commit SHAs. Dispatch-only with a production
# environment gate: changes accumulate on the trunk and a maintainer promotes
# the batch in one fast-forward.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  promote:
    runs-on: ubuntu-latest
    if: github.repository == 'G-Core/terraform-provider-gcore-staging'
    environment: production
    env:
      PRODUCTION_REPO: G-Core/terraform-provider-gcore
      # Stainless-generated provider lives on the v2 branch (production_repo: ...#v2).
      PRODUCTION_BRANCH: v2
      GH_TOKEN: ${{ secrets.SDK_PROD_WRITE_TOKEN }}
    steps:
      - name: Check out staging
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch production main
        run: |
          git remote add production \
            "https://x-access-token:${GH_TOKEN}@github.com/${PRODUCTION_REPO}.git"
          git fetch production "${PRODUCTION_BRANCH}"

      - name: Check whether production already has staging's content
        id: diff
        run: |
          # Compare by content — SHAs differ after a release adds version/changelog.
          MERGED=$(git merge-tree --write-tree "production/${PRODUCTION_BRANCH}" origin/main) || MERGED=conflict
          PRODUCTION_TREE=$(git rev-parse "production/${PRODUCTION_BRANCH}^{tree}")
          if [ "$MERGED" = "$PRODUCTION_TREE" ]; then
            echo "Production already contains staging's content. Nothing to promote."
            echo "synced=true" >> "$GITHUB_OUTPUT"
          else
            echo "synced=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Promote staging to production (fast-forward)
        if: steps.diff.outputs.synced == 'false'
        run: |
          # Refuse unless production/main is an ancestor of staging/main (else
          # staging has forked from production and can't be fast-forwarded).
          if ! git merge-base --is-ancestor "production/${PRODUCTION_BRANCH}" origin/main; then
            echo "::error title=Promote blocked::production/${PRODUCTION_BRANCH} is not an ancestor of staging main."
            exit 1
          fi
          git push production "origin/main:refs/heads/${PRODUCTION_BRANCH}"
          echo "Pushed staging/main to production/${PRODUCTION_BRANCH} via fast-forward."
