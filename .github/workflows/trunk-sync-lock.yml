name: Trunk sync lock

# Posts a `trunk-synced` commit status to open PRs targeting `main`: red while
# production is ahead of the trunk (a release hasn't been synced back), green
# once in sync. Make `trunk-synced` a required status check to block merges
# onto a stale trunk.
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_run:
    workflows: ["Sync from production"]
    types: [completed]
  repository_dispatch:
    types: [prod-released]
  workflow_dispatch: {}
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: read
  statuses: write
  pull-requests: read

jobs:
  lock:
    runs-on: ubuntu-latest
    if: github.repository == 'G-Core/terraform-provider-gcore-staging'
    env:
      PRODUCTION_REPO: G-Core/terraform-provider-gcore
      PRODUCTION_BRANCH: v2
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Evaluate sync state and post status to open main PRs
        run: |
          set -euo pipefail
          git remote add production "https://x-access-token:${GH_TOKEN}@github.com/${PRODUCTION_REPO}.git"
          git fetch --no-tags production "${PRODUCTION_BRANCH}"
          if git merge-base --is-ancestor "production/${PRODUCTION_BRANCH}" HEAD; then
            state=success; desc="main is in sync with production"
          else
            state=failure; desc="production is ahead — wait for the back-sync before merging"
          fi
          echo "trunk-synced => $state ($desc)"
          shas=$(gh pr list --repo "$GITHUB_REPOSITORY" --base main --state open --json headRefOid --jq '.[].headRefOid')
          if [ -z "$shas" ]; then echo "no open PRs targeting main"; exit 0; fi
          for sha in $shas; do
            gh api -X POST "repos/$GITHUB_REPOSITORY/statuses/$sha" \
              -f state="$state" -f context="trunk-synced" -f description="$desc" >/dev/null
            echo "posted trunk-synced=$state to $sha"
          done
