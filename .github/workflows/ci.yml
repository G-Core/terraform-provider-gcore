name: CI
on:
  push:
    branches:
      - '**'
      - '!integrated/**'
      - '!stl-preview-head/**'
      - '!stl-preview-base/**'
      - '!generated'
      - '!codegen/**'
      - 'codegen/stl/**'
  pull_request:
    branches-ignore:
      - 'stl-preview-head/**'
      - 'stl-preview-base/**'

env:
  GOPRIVATE: github.com/G-Core/gcore-go,github.com/G-Core/gcore-go-staging

jobs:
  lint:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.fork
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-go
        with:
          go-repo-read-token: ${{ secrets.GO_REPO_READ_TOKEN }}

      # TODO: GCLOUD2-24419 - remove workaround when Stainless fixes scripts/link to handle missing SDK branches
      - name: Link staging branch
        if: github.repository == 'G-Core/terraform-provider-gcore-staging'
        run: |
          ./scripts/link 'github.com/G-Core/gcore-go-staging@${{ github.ref_name }}' || true

      - name: Bootstrap
        run: ./scripts/bootstrap

      - name: Run lints
        run: ./scripts/lint

  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.fork
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-go
        with:
          go-repo-read-token: ${{ secrets.GO_REPO_READ_TOKEN }}

      # TODO: GCLOUD2-24419 - remove workaround when Stainless fixes scripts/link to handle missing SDK branches
      - name: Link staging branch
        if: github.repository == 'G-Core/terraform-provider-gcore-staging'
        run: |
          ./scripts/link 'github.com/G-Core/gcore-go-staging@${{ github.ref_name }}' || true

      - name: Bootstrap
        run: ./scripts/bootstrap

      - name: Run tests
        run: ./scripts/test