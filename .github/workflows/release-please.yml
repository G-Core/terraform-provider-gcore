name: Release Please
on:
  push:
    branches:
      - v2

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: github.repository == 'G-Core/terraform-provider-gcore'
    runs-on: ubuntu-latest

    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          # Generated code lives on the v2 branch (not the repo default branch
          # `master`); release-please-action defaults target-branch to the default
          # branch, so it must be set explicitly or it looks for config/manifest
          # on master and fails. Custom code — stlc's publish.release{branch: v2}
          # sets the `on:` trigger but not this input.
          target-branch: v2
