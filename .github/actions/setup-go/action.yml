name: Setup Go
description: 'Sets up Go environment'
inputs:
  go-version:
    required: false
    description: version or version range of Go to use
  cache-dependency-path:
    required: false
    description: path to dependency files for caching
  go-repo-read-token:
    required: false
    description: fine-grained GitHub PAT with Contents:Read on the Go SDK repo (needed when the SDK repo is private)
runs:
  using: composite
  steps:
    - name: Authenticate git for the private Go SDK repo
      if: inputs.go-repo-read-token != ''
      shell: bash
      env:
        GO_MODULE_REPO: ${{ github.repository == 'G-Core/terraform-provider-gcore-staging' && 'G-Core/gcore-go-staging' || 'G-Core/gcore-go' }}
      run: git config --global url."https://x-access-token:${{ inputs.go-repo-read-token }}@github.com/${GO_MODULE_REPO}".insteadOf "https://github.com/${GO_MODULE_REPO}"

    - name: Setup go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
      with:
        go-version: ${{ inputs.go-version }}
        go-version-file: ./go.mod
        cache-dependency-path: ${{ inputs.cache-dependency-path }}

    - name: Bootstrap
      shell: bash
      run: ./scripts/bootstrap